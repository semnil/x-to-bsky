name: CI
run-name: ${{ github.ref_name }} CI ✅

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test 🧪
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Node 🟢
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack 📦
        run: corepack enable

      - name: Install Dependencies 📦
        run: npm install

      - name: Run Tests ✅
        run: npm test
